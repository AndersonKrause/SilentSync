<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>SilentSync - Mobile</title>
    <link rel="stylesheet" href="../css/mobile.css?v=6">
</head>
<body>

<div class="mobile-shell">

    <div class="mobile-card">
        <div class="topline">
            <div class="brand-row">
                <div class="roomline">
                    <span data-i18n="room">Sala</span>: <b id="roomEcho">—</b>
                </div>

                <div class="lang-switch">
                    <select id="languageSelect">
                        <option value="pt">🇧🇷 PT</option>
                        <option value="en">🇺🇸 EN</option>
                        <option value="de">🇩🇪 DE</option>
                    </select>
                </div>
            </div>
        </div>

        <span id="status" data-i18n="statusDisconnected">desconectado</span>

        <button id="logoutBtn" type="button" class="primary-btn" data-i18n="logout">
            Sair
        </button>
    </div>

    <div class="mobile-card">
        <h3 data-i18n="audio">Áudio sincronizado</h3>

        <audio id="audio" controls playsinline></audio>

        <button id="playBtn" type="button" disabled class="secondary-btn" data-i18n="play">
            Play
        </button>
    </div>

</div>

<!-- elementos mantidos só para o JS -->
<button id="goRegisterBtn" type="button" hidden>Ir para Registro</button>

<div id="joinCard" hidden>
    <input id="roomCode" />
    <input id="displayName" />
    <button id="joinBtn" disabled>Entrar</button>
    <div id="joinInfo"></div>
</div>

<div id="infoText" hidden></div>
<b id="offset" hidden>?</b>
<b id="rtt" hidden>?</b>
<b id="targetPos" hidden>?</b>
<div id="audioUrlText" hidden></div>
<pre id="log" hidden></pre>

<script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.7/dist/browser/signalr.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.15"></script>
<script src="../js/i18n.js?v=3"></script>
<script src="../js/mobile.js?v=3"></script>

</body>
</html>
