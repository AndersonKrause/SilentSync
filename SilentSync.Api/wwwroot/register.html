<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>SilentSync - Login</title>
    <link rel="stylesheet" href="css/register.css">
</head>
<body>
<h2>Login <span id="status" class="pill">pronto</span></h2>

<div class="card">
    <div class="small">Sala: <b id="roomText">—</b></div>
    <div class="small" style="margin-top:6px">Após autenticar, você será direcionado para o Mobile para ouvir o áudio.</div>
</div>

<div class="card">
    <div class="tabs">
        <button id="tabLogin" class="tab active" type="button">Entrar</button>
        <button id="tabCreate" class="tab" type="button">Criar conta</button>
        <button id="tabForgot" class="tab" type="button">Esqueci a senha</button>
    </div>
</div>

<!-- LOGIN (B1) -->
<div class="card" id="panelLogin">
    <h3 style="margin:0 0 8px 0;">Entrar</h3>

    <label>Email</label>
    <input id="loginEmail" placeholder="you@email.com" autocomplete="email"/>

    <label>Senha</label>
    <input id="loginPassword" type="password" placeholder="sua senha" autocomplete="current-password"/>

    <button id="loginBtn">Entrar</button>

    <div id="loginInfo" class="small"></div>
</div>

<!-- CREATE (A) Step 1 -->
<div class="card hide" id="panelCreate1">
    <h3 style="margin:0 0 8px 0;">Criar conta</h3>

    <label>Email</label>
    <input id="createEmail" placeholder="you@email.com" autocomplete="email"/>

    <label>Senha</label>
    <input id="createPw1" type="password" placeholder="mínimo 6 caracteres" autocomplete="new-password"/>

    <label>Repita a senha</label>
    <input id="createPw2" type="password" placeholder="repita a senha" autocomplete="new-password"/>

    <button id="createStartBtn">Enviar código de verificação</button>

    <div id="createInfo" class="small"></div>
</div>

<!-- CREATE (A) Step 2 -->
<div class="card hide" id="panelCreate2">
    <h3 style="margin:0 0 8px 0;">Confirmar código</h3>

    <div class="small">Enviamos um código para <b id="createEmailEcho">—</b>.</div>

    <label>Código (6 dígitos)</label>
    <input id="createCode" inputmode="numeric" maxlength="6" placeholder="ex: 963305"/>

    <div class="two">
        <button id="createCompleteBtn">Confirmar e entrar</button>
        <button id="createResendBtn" type="button">Reenviar código</button>
    </div>

    <div id="createCodeInfo" class="small"></div>
</div>

<!-- FORGOT Step 1 -->
<div class="card hide" id="panelForgot1">
    <h3 style="margin:0 0 8px 0;">Esqueci a senha</h3>

    <label>Email</label>
    <input id="forgotEmail" placeholder="you@email.com" autocomplete="email"/>

    <button id="forgotSendBtn">Enviar código</button>

    <div id="forgotInfo" class="small"></div>
</div>

<!-- FORGOT Step 2 -->
<div class="card hide" id="panelForgot2">
    <h3 style="margin:0 0 8px 0;">Redefinir senha</h3>

    <div class="small">Enviamos um código para <b id="forgotEmailEcho">—</b>.</div>

    <label>Código (6 dígitos)</label>
    <input id="forgotCode" inputmode="numeric" maxlength="6" placeholder="ex: 963305"/>

    <label>Nova senha</label>
    <input id="forgotPw1" type="password" placeholder="mínimo 6 caracteres" autocomplete="new-password"/>

    <label>Repita a nova senha</label>
    <input id="forgotPw2" type="password" placeholder="repita a senha" autocomplete="new-password"/>

    <div class="two">
        <button id="forgotResetBtn">Salvar e entrar</button>
        <button id="forgotResendBtn" type="button">Reenviar código</button>
    </div>

    <div id="forgotCodeInfo" class="small"></div>
</div>

<pre id="log"></pre>
<script src="js/register.js"></script>

</body>
</html>
