<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>SilentSync - Screen</title>
    <style>
        *{box-sizing:border-box}
        html,body{height:100%}
        body{margin:0;background:#000;overflow:hidden;font-family:system-ui,Arial}
        .stage{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#000}
        video{width:100%;height:100%;object-fit:contain;background:#000}

        .hud{
            position:absolute; inset:0; pointer-events:none;
            display:flex; justify-content:space-between; align-items:flex-start;
            padding: clamp(14px, 2vw, 26px);
            transition: opacity .4s ease, visibility .4s ease;
        }

        .hud.hidden{
            opacity:0;
            visibility:hidden;
        }

        .room{
            color:#fff; font-weight:900; letter-spacing:.12em; text-transform:uppercase;
            font-size: clamp(18px, 2.6vw, 42px);
            text-shadow: 0 12px 40px rgba(0,0,0,.65);
            background: rgba(0,0,0,.35);
            border: 1px solid rgba(255,255,255,.16);
            border-radius: 16px;
            padding: 10px 14px;
            backdrop-filter: blur(6px);
            max-width: 55vw;
            overflow:hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        .qr{
            display:flex; flex-direction:column; align-items:center; gap:10px;
            background: rgba(0,0,0,.35);
            border: 1px solid rgba(255,255,255,.16);
            border-radius: 16px;
            padding: 12px;
            backdrop-filter: blur(6px);
        }

        #qrImg{
            width: clamp(120px, 14vw, 220px);
            height:auto; background:#fff; border-radius: 12px; padding: 8px;
        }

        .hint{
            color:#fff; font-size: 12px; opacity: .85; text-align:center;
            max-width: 260px;
        }
    </style>
</head>
<body>
<div class="stage">
    <video id="video" muted playsinline disablepictureinpicture></video>

    <div class="hud">
        <div class="room" id="roomText">ROOM —</div>
        <div class="qr">
            <img id="qrImg" alt="QR Registro"/>
            <div class="hint" id="qrHint"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.7/dist/browser/signalr.min.js"></script>
<script>
    const params = new URLSearchParams(location.search);
    const ROOM = (params.get("room") || "").trim().toUpperCase();
    if(!ROOM) alert("Abra como screen.html?room=ABC123");

    const roomText = document.getElementById("roomText");
    const video = document.getElementById("video");
    const qrImg = document.getElementById("qrImg");
    const qrHint = document.getElementById("qrHint");
    const hud = document.querySelector(".hud");

    roomText.textContent = `ROOM: ${ROOM}`;

    const baseOrigin = window.location.origin;
    const REG_URL = `${baseOrigin}/register.html?room=${encodeURIComponent(ROOM)}`;

    qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=320x320&data=${encodeURIComponent(REG_URL)}`;

    if (location.hostname === "localhost" || location.hostname === "127.0.0.1") {
        qrHint.textContent = "Abra o telão pelo IP para o QR funcionar no celular.";
    } else {
        qrHint.textContent = "Escaneie para entrar e ouvir o áudio no celular.";
    }

    function showHudForFiveMinutes() {
        hud.classList.remove("hidden");

        clearTimeout(window.__hudTimer);
        window.__hudTimer = setTimeout(() => {
            hud.classList.add("hidden");
        }, 5 * 60 * 1000);
    }

    async function tryEnterFullscreen() {
        const el = document.documentElement;

        try {
            if (el.requestFullscreen) {
                await el.requestFullscreen();
            } else if (el.webkitRequestFullscreen) {
                await el.webkitRequestFullscreen();
            }
        } catch (e) {
            console.warn("fullscreen blocked", e);
        }
    }

    let conn = null;
    let currentVideoUrl = "";
    let lastState = null;

    function absUrl(input){
        if(!input) return "";
        try { return new URL(input, location.origin).toString(); }
        catch { return input; }
    }

    async function applyState(state, reason=""){
        if(!state) return;
        if((state.roomCode || "").toUpperCase() !== ROOM) return;

        lastState = state;

        const vurl = absUrl(state.videoUrl);
        if (vurl && vurl !== currentVideoUrl) {
            currentVideoUrl = vurl;

            video.src = vurl;
            video.load();

            video.onloadedmetadata = () => { if (lastState) applyState(lastState, "loadedmetadata"); };
            video.oncanplay = () => { if (lastState) applyState(lastState, "canplay"); };
        }

        if (state.isPlaying) { try { await video.play(); } catch {} }
        else { video.pause(); }

        const target = Math.max(0, (state.positionMs ?? 0)) / 1000;
        if (video.readyState >= 1) {
            if (Math.abs(video.currentTime - target) > 0.35) {
                video.currentTime = target;
            }
        }
    }

    async function joinAndPull(){
        await conn.invoke("JoinScreen", ROOM);
        const state = await conn.invoke("GetPlayerState", ROOM);
        if(state) await applyState(state, "pull");
    }

    async function start(){
        showHudForFiveMinutes();
        await tryEnterFullscreen();

        const hubUrl = location.origin + "/hubs/rooms";

        conn = new signalR.HubConnectionBuilder()
            .withUrl(hubUrl)
            .withAutomaticReconnect()
            .build();

        conn.on("playerStateChanged", (state) => applyState(state, "push"));

        conn.onreconnected(async () => {
            try { await joinAndPull(); } catch(e) { console.warn("reconnected flow failed", e); }
        });

        await conn.start();
        await joinAndPull();
    }

    start().catch(console.warn);
</script>
</body>
</html>
