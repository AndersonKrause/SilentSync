<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>SilentSync Screen</title>

    <style>
        *{box-sizing:border-box}

        html,body{
            height:100%;
            margin:0;
            background:#000;
            font-family:system-ui,Arial;
            overflow:hidden;
        }

        .stage{
            position:relative;
            width:100%;
            height:100%;
            display:flex;
            align-items:center;
            justify-content:center;
            background:#000;
        }

        video{
            width:100%;
            height:100%;
            object-fit:contain;
            background:#000;
        }

        .hud{
            position:absolute;
            inset:0;
            display:flex;
            justify-content:space-between;
            align-items:flex-start;
            padding:20px;
            pointer-events:none;
            transition:opacity .4s;
        }

        .hud.hidden{
            opacity:0;
        }

        .room{
            color:#fff;
            font-size:36px;
            font-weight:800;
            letter-spacing:.1em;
            background:rgba(0,0,0,.4);
            padding:12px 16px;
            border-radius:12px;
        }

        .qr{
            background:rgba(0,0,0,.4);
            padding:12px;
            border-radius:12px;
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:10px;
        }

        #qrImg{
            width:180px;
            background:#fff;
            padding:10px;
            border-radius:10px;
        }

        .hint{
            color:#fff;
            font-size:12px;
            opacity:.85;
            text-align:center;
            max-width:200px;
        }

        .start-overlay{
            position:fixed;
            inset:0;
            background:#000;
            display:flex;
            align-items:center;
            justify-content:center;
            z-index:999;
        }

        .start-overlay.hidden{
            display:none;
        }

        #startBtn{
            font-size:28px;
            padding:20px 30px;
            border-radius:14px;
            border:none;
            cursor:pointer;
            background:#fff;
        }
    </style>
</head>

<body>

<div id="startOverlay" class="start-overlay">
    <button id="startBtn">Iniciar Telão</button>
</div>

<div class="stage">

    <video id="video" muted playsinline disablepictureinpicture></video>

    <div class="hud">
        <div class="room" id="roomText">ROOM —</div>

        <div class="qr">
            <img id="qrImg"/>
            <div class="hint" id="qrHint"></div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.7/dist/browser/signalr.min.js"></script>

<script>

    const params = new URLSearchParams(location.search);
    const ROOM = (params.get("room") || "").toUpperCase();

    if(!ROOM){
        alert("Abra como screen.html?room=ABC123");
    }

    const video = document.getElementById("video");
    const roomText = document.getElementById("roomText");
    const qrImg = document.getElementById("qrImg");
    const qrHint = document.getElementById("qrHint");
    const hud = document.querySelector(".hud");

    const startOverlay = document.getElementById("startOverlay");
    const startBtn = document.getElementById("startBtn");

    roomText.textContent = "ROOM: " + ROOM;

    const registerUrl = location.origin + "/register.html?room=" + encodeURIComponent(ROOM);

    qrImg.src =
        "https://api.qrserver.com/v1/create-qr-code/?size=320x320&data="
        + encodeURIComponent(registerUrl);

    if(location.hostname === "localhost"){
        qrHint.textContent =
            "Abra o telão pelo IP para o QR funcionar no celular";
    }else{
        qrHint.textContent =
            "Escaneie para entrar e ouvir o áudio no celular";
    }

    function showHudFiveMinutes(){

        hud.classList.remove("hidden");

        setTimeout(()=>{
            hud.classList.add("hidden");
        },300000);

    }

    async function enterFullscreen(){

        const el = document.documentElement;

        if(el.requestFullscreen){
            await el.requestFullscreen();
        }else if(el.webkitRequestFullscreen){
            await el.webkitRequestFullscreen();
        }

    }

    let conn;
    let currentVideoUrl="";
    let lastState=null;

    function absUrl(u){
        try{
            return new URL(u,location.origin).toString();
        }catch{
            return u;
        }
    }

    async function applyState(state){

        if(!state) return;

        if((state.roomCode||"").toUpperCase()!==ROOM) return;

        lastState = state;

        const videoUrl = absUrl(state.videoUrl);

        if(videoUrl && videoUrl!==currentVideoUrl){

            currentVideoUrl = videoUrl;

            video.src = videoUrl;
            video.load();

        }

        if(state.isPlaying){

            try{
                await video.play();
            }catch{}

        }else{

            video.pause();

        }

        const target = Math.max(0,state.positionMs||0)/1000;

        if(video.readyState>=1){

            if(Math.abs(video.currentTime-target)>0.35){
                video.currentTime = target;
            }

        }

    }

    async function joinAndPull(){

        await conn.invoke("JoinScreen",ROOM);

        const state = await conn.invoke("GetPlayerState",ROOM);

        if(state){
            await applyState(state);
        }

    }

    async function start(){

        showHudFiveMinutes();

        const hubUrl = location.origin + "/hubs/rooms";

        conn = new signalR.HubConnectionBuilder()
            .withUrl(hubUrl)
            .withAutomaticReconnect()
            .build();

        conn.on("playerStateChanged",(state)=>{
            applyState(state);
        });

        await conn.start();

        await joinAndPull();

    }

    startBtn.onclick = async () => {

        await enterFullscreen();

        startOverlay.classList.add("hidden");

        start().catch(console.warn);

    };

</script>

</body>
</html>
