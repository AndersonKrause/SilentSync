<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>SilentSync - Admin</title>
    <link href="style.css" rel="stylesheet">
</head>

<body>

<h2 style="display:flex; gap:10px; align-items:center;">
    Admin
    <span id="status" class="pill">desconectado</span>
    <button id="logoutBtn" class="btnSmall">Logout</button>
</h2>

<div class="card">

    <h3>Sala</h3>

    <div class="actions two">
        <button id="createRoomBtn">Criar Room</button>
        <button id="openScreenBtn" disabled>Abrir Telão</button>
    </div>

    <label>Room Code</label>
    <input id="roomCode" placeholder="CODE"/>

    <div class="small">
        <div><b>Link Telão:</b> <span id="screenLinkText">—</span></div>
        <div><b>Link Registro:</b> <span id="regLinkText">—</span></div>
    </div>

    <div style="margin-top:10px;">
        <img id="qrReg" style="display:none;width:140px;">
        <button id="copyRegBtn" disabled>Copiar link</button>
    </div>

</div>

<div class="card">

    <h3>Mídia</h3>

    <input id="file" type="file" accept="video/*">

    <button id="uploadBtn">Upload</button>

    <progress id="uploadProg" value="0" max="100" style="display:none"></progress>

    <label>Audio URL</label>
    <input id="audioUrl">

    <label>Video URL</label>
    <input id="videoUrl">

    <button id="connectBtn">Conectar controller</button>

</div>

<div class="card">

    <h3>Controles</h3>

    <div class="actions two">
        <button id="playBtn">Play</button>
        <button id="pauseBtn">Pause</button>
    </div>

    <label>Seek (ms)</label>
    <input id="seekMs">

    <button id="seekBtn">Seek</button>

</div>

<video id="video" controls muted playsinline></video>

<pre id="log"></pre>

<script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.7/dist/browser/signalr.min.js"></script>

<script>

    const PUBLIC_ORIGIN = window.location.origin

    const LS = { token:"ss_token" }

    function getToken(){
        return localStorage.getItem(LS.token)||""
    }

    function logout(){
        localStorage.removeItem(LS.token)
        location.href="/register.html?next=admin"
    }

    (function checkAuth(){
        if(!getToken()){
            location.href="/register.html?next=admin"
        }
    })()

    document.getElementById("logoutBtn").onclick=logout

    const logEl=document.getElementById("log")
    const statusEl=document.getElementById("status")
    const video=document.getElementById("video")

    function log(...a){
        logEl.textContent+=a.join(" ")+"\n"
    }

    function setStatus(s){
        statusEl.textContent=s
    }

    function norm(s){
        return (s||"").trim().toUpperCase()
    }

    function buildLinks(roomCode){

        const screenUrl=`${PUBLIC_ORIGIN}/screen.html?room=${roomCode}`
        const regUrl=`${PUBLIC_ORIGIN}/register.html?room=${roomCode}`

        return {screenUrl,regUrl}
    }

    function renderLinks(code){

        const rc=norm(code)

        if(!rc)return

        const {screenUrl,regUrl}=buildLinks(rc)

        document.getElementById("screenLinkText").textContent=screenUrl
        document.getElementById("regLinkText").textContent=regUrl

        const qr=document.getElementById("qrReg")

        qr.src=`https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=${encodeURIComponent(regUrl)}`
        qr.style.display="block"

    }

    document.getElementById("roomCode").addEventListener("input",(e)=>{
        renderLinks(e.target.value)
    })

    document.getElementById("createRoomBtn").onclick=async()=>{

        try{

            const token=getToken()

            const res=await fetch("/api/rooms",{
                method:"POST",
                headers:{
                    Authorization:"Bearer "+token
                }
            })

            if(res.status===401){
                logout()
                return
            }

            const json=await res.json()

            const code=json.code||json.Code

            document.getElementById("roomCode").value=code

            renderLinks(code)

            const {screenUrl}=buildLinks(code)

            window.open(screenUrl,"_blank")

        }catch(e){

            alert("Erro criando sala")

        }

    }

    document.getElementById("copyRegBtn").onclick=async()=>{

        const rc=norm(document.getElementById("roomCode").value)

        const {regUrl}=buildLinks(rc)

        await navigator.clipboard.writeText(regUrl)

    }

    document.getElementById("file").addEventListener("change",(ev)=>{

        const f=ev.target.files?.[0]

        if(!f)return

        video.src=URL.createObjectURL(f)

    })

    document.getElementById("uploadBtn").onclick=async()=>{

        const f=document.getElementById("file").files?.[0]

        if(!f)return

        const xhr=new XMLHttpRequest()

        xhr.open("POST","/api/media/upload")

        xhr.responseType="json"

        xhr.onload=()=>{

            const r=xhr.response

            document.getElementById("audioUrl").value=PUBLIC_ORIGIN+r.audioPath
            document.getElementById("videoUrl").value=PUBLIC_ORIGIN+r.videoPath

        }

        const form=new FormData()

        form.append("file",f)

        xhr.send(form)

    }

    let conn=null

    function buildPayload(){

        const roomCode=norm(document.getElementById("roomCode").value)

        const audioUrl=document.getElementById("audioUrl").value.trim()
        const videoUrl=document.getElementById("videoUrl").value.trim()

        const isPlaying=!video.paused&&!video.ended

        const positionMs=Math.floor(video.currentTime*1000)

        return {roomCode,isPlaying,positionMs,audioUrl,videoUrl}

    }

    async function sendState(){

        const p=buildPayload()

        const state=await conn.invoke("UpdatePlayerState",{
            roomCode:p.roomCode,
            isPlaying:p.isPlaying,
            positionMs:p.positionMs,
            audioUrl:p.audioUrl,
            videoUrl:p.videoUrl
        })

        log("state sent")

    }

    document.getElementById("connectBtn").onclick=async()=>{

        const roomCode=norm(document.getElementById("roomCode").value)

        if(!roomCode)return

        const hubUrl=PUBLIC_ORIGIN+"/hubs/rooms"

        conn=new signalR.HubConnectionBuilder()
            .withUrl(hubUrl,{
                accessTokenFactory:()=>getToken()
            })
            .withAutomaticReconnect()
            .build()

        await conn.start()

        setStatus("conectado")

        await conn.invoke("JoinAsController",roomCode)

    }

    document.getElementById("playBtn").onclick=async()=>{
        await video.play()
        await sendState()
    }

    document.getElementById("pauseBtn").onclick=async()=>{
        video.pause()
        await sendState()
    }

    document.getElementById("seekBtn").onclick=async()=>{

        const v=parseInt(document.getElementById("seekMs").value)

        video.currentTime=v/1000

        await sendState()

    }

    video.addEventListener("play",sendState)
    video.addEventListener("pause",sendState)
    video.addEventListener("seeked",sendState)

</script>

</body>
</html>
