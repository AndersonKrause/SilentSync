<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>SilentSync - Telão Controller</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, Arial; margin: 16px; max-width: 980px; }
        label { display:block; font-weight: 600; margin-top: 10px; }
        input, button { padding: 10px; margin-top: 6px; width: 100%; }
        .pill { display:inline-block; padding:2px 10px; border:1px solid #ccc; border-radius:999px; font-size:12px; }

        .grid {
            display: grid;
            gap: 14px;
            grid-template-columns: 1fr;
            align-items: start;
        }
        @media (min-width: 900px) {
            .grid { grid-template-columns: 1fr 1fr; }
        }

        .card {
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            padding: 14px;
            background: #fff;
        }

        .actions {
            display: grid;
            gap: 10px;
            grid-template-columns: 1fr;
            margin-top: 10px;
        }
        @media (min-width: 900px) {
            .actions.two { grid-template-columns: 1fr 1fr; }
        }

        video { width: 100%; margin-top: 12px; background:#000; border-radius: 12px; }
        .small { font-size: 12px; opacity: 0.8; margin-top: 8px; }
        pre { background:#f6f6f6; padding:10px; border-radius:12px; overflow:auto; }
        .hint { font-size: 12px; opacity: .85; margin-top: 6px; }
    </style>
</head>

<body>
<h2>Telão Controller <span id="status" class="pill">desconectado</span></h2>

<div class="grid">
    <div class="card">
        <label>Room Code</label>
        <input id="roomCode" placeholder="6 Digits Code" />

        <label>MasterKey</label>
        <input id="masterKey" placeholder="(User Secrets: Player:MasterKey)" />

        <label>Audio URL (opcional)</label>
        <input id="audioUrl" placeholder="(se for usar URL no mobile) ex: https://.../audio.m3u8 ou .mp3" />
        <div class="hint">No modo “arquivo local”, deixe vazio.</div>

        <div class="actions">
            <button id="connectBtn">Conectar</button>
        </div>

        <div class="small">DEV: abra via http://localhost:5031/controller.html (sem HTTPS redirect).</div>
    </div>

    <div class="card">
        <label>Arquivo de vídeo (local)</label>
        <input id="file" type="file" accept="video/*" />

        <div class="actions two">
            <button id="playBtn">Play</button>
            <button id="pauseBtn">Pause</button>
        </div>

        <label>Seek (ms)</label>
        <input id="seekMs" placeholder="ex: 83400" />

        <div class="actions">
            <button id="seekBtn">Seek</button>
        </div>

        <div class="small">Deixe o vídeo mutado; o áudio real toca nos celulares.</div>
    </div>
</div>

<video id="video" controls muted playsinline></video>

<label>Video URL (mp4/webm) (opcional)</label>
<input id="videoUrl" placeholder="https://.../video.mp4" />
<button id="loadVideoUrlBtn">Carregar URL</button>

<pre id="log"></pre>

<script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.7/dist/browser/signalr.min.js"></script>
<script>
    const logEl = document.getElementById('log');
    const statusEl = document.getElementById('status');
    const video = document.getElementById('video');

    const norm = (s) => (s || "").trim().toUpperCase();

    function log(...a){
        const line = a.map(x => typeof x === 'string' ? x : JSON.stringify(x, null, 2)).join(' ');
        logEl.textContent += line + "\n";
        logEl.scrollTop = logEl.scrollHeight;
    }
    function setStatus(s){ statusEl.textContent = s; }

    let conn = null;

    // ✅ garante que não enviamos estado antes do vídeo estar pronto
    let videoReady = false;

    video.addEventListener('loadedmetadata', () => {
        videoReady = true;
        log("video metadata ready. duration(s)=", video.duration);
        scheduleSend("loadedmetadata");
    });

    video.addEventListener('error', () => {
        log("VIDEO ERROR:", video.error);
    });

    // ✅ throttle correto: 1 timer, sempre manda o último estado
    let throttleTimer = null;
    let lastReason = "";
    function scheduleSend(reason) {
        lastReason = reason;

        if (!conn) return;
        if (throttleTimer) return;

        throttleTimer = setTimeout(async () => {
            throttleTimer = null;
            await sendState(lastReason);
        }, 300);
    }

    function buildPayload() {
        const roomCode = norm(document.getElementById('roomCode').value);
        const masterKey = document.getElementById('masterKey').value;
        const audioUrl = (document.getElementById('audioUrl').value || "").trim();

        const positionMs = videoReady ? Math.max(0, Math.floor(video.currentTime * 1000)) : 0;
        const isPlaying = videoReady && !video.paused && !video.ended && positionMs > 0;

        return { roomCode, isPlaying, positionMs, audioUrl, masterKey };
    }

    async function sendState(reason) {
        if (!conn) return;

        const payload = buildPayload();
        if (!payload.roomCode) return;

        // debug útil
        log("sending:", reason, {
            isPlaying: payload.isPlaying,
            positionMs: payload.positionMs,
            currentTime: video.currentTime,
            ready: videoReady
        });

        try {
            const state = await conn.invoke("UpdatePlayerState", {
                roomCode: payload.roomCode,
                isPlaying: payload.isPlaying,
                positionMs: payload.positionMs,
                audioUrl: payload.audioUrl,
                masterKey: payload.masterKey
            });
            log("sent ok:", reason, state);
        } catch (e) {
            log("ERROR sendState:", reason, e?.message || e);
        }
    }

    document.getElementById('connectBtn').onclick = async () => {
        const roomCode = norm(document.getElementById('roomCode').value);
        const masterKey = document.getElementById('masterKey').value;

        if (!roomCode) { alert("Preencha Room Code."); return; }
        if (!masterKey) { alert("Preencha MasterKey."); return; }

        const hubUrl = window.location.origin + "/hubs/rooms";

        conn = new signalR.HubConnectionBuilder()
            .withUrl(hubUrl)
            .withAutomaticReconnect()
            .build();

        conn.onclose(() => setStatus("desconectado"));
        conn.onreconnecting(() => setStatus("reconectando..."));
        conn.onreconnected(() => setStatus("conectado"));

        await conn.start();
        setStatus("conectado");
        log("connected:", hubUrl);

        try {
            await conn.invoke("JoinAsController", roomCode, masterKey);
            log("joined as controller:", roomCode);
        } catch (e) {
            log("ERROR JoinAsController:", e?.message || e);
            alert("Falha ao entrar como controller. Confira MasterKey e RoomCode.");
            return;
        }

        // manda estado inicial (mesmo se vídeo ainda não estiver pronto)
        scheduleSend("connect");
    };

    document.getElementById('file').addEventListener('change', (ev) => {
        const f = ev.target.files?.[0];
        if (!f) return;

        videoReady = false;
        video.src = URL.createObjectURL(f);
        log("video loaded (local):", f.name);
        // loadedmetadata vai disparar e marcar ready
    });

    document.getElementById('loadVideoUrlBtn').onclick = () => {
        const url = (document.getElementById('videoUrl').value || "").trim();
        if (!url) return alert("Cole uma URL de vídeo.");
        videoReady = false;
        video.src = url;
        log("video url set:", url);
        // loadedmetadata vai disparar e marcar ready
    };

    document.getElementById('playBtn').onclick = async () => {
        try {
            await video.play();
            scheduleSend("playBtn");
        } catch(e) {
            log("ERROR play():", e?.message || e);
            alert("Não consegui dar play (restrição do browser?). Clique no vídeo e tente novamente.");
        }
    };

    document.getElementById('pauseBtn').onclick = () => {
        video.pause();
        scheduleSend("pauseBtn");
    };

    document.getElementById('seekBtn').onclick = () => {
        const v = parseInt(document.getElementById('seekMs').value, 10);
        if (!Number.isFinite(v)) { alert("Seek inválido"); return; }
        video.currentTime = v / 1000;
        scheduleSend("seekBtn");
    };

    // eventos do vídeo
    video.addEventListener('play',     () => scheduleSend("play"));
    video.addEventListener('pause',    () => scheduleSend("pause"));
    video.addEventListener('seeking',  () => scheduleSend("seeking"));
    video.addEventListener('seeked',   () => scheduleSend("seeked"));
    video.addEventListener('timeupdate', () => scheduleSend("timeupdate"));
</script>
</body>
</html>
